about_content: | # this will include new lines to allow paragraphs
  Hands on technical lead with agency and startup experience. Proven leadership and management skills.  20+ years working in development and leadership roles in mobile and web.  
  
  Pragmatic problem solver.  Firm believer in the importance of building kind, nurturing working environments that deliver maximum ROI  by enabling everyone to reach their full potential. 
  
  Proficient in Kotlin, Java, Android development, Typescript, Laravel, VueJS and database design. Agile enthusiast. 
  
  Looking to find a home  at a company where I can make a real difference.


