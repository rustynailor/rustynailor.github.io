      - layout: left
        title: Bond Digital Health
        sub_title: CTO
        caption: MARCH  2019 - SEPTEMBER 2022,  CARDIFF
        quote: >
          Lead development of a universal data capture platform for the lateral flow industry
        description: | # this will include new lines to allow paragraphs
          Developed prototype versions of the main API, web and mobile apps, as well as acting as sole developer on several successful R&D projects in association with Swansea University. 
          
          Designed and implemented Agile based workflows and practices appropriate for the digital healthcare space. 
          
          Led recruitment to scale the development team from two to a 20 strong unit, including taking on line management and review responsibilities.  
          
          Introduced a CI based deployment workflow that drastically reduced testing time and enabled automated build delivery to clients. 
          
          Successfully delivered releases of Transform to our main US client, including securing app store approval and FDA authorisation, to supply Covid test reporting  to consumers and businesses across North America. 

      - layout: left
        title: Rantmedia
        sub_title: CTO
        caption: JANUARY 2015 - FEBRUARY 2019
        quote: >
          Lead developer at a BAFTA winning mobile development studio
        description: | # this will include new lines to allow paragraphs
          Led a cross platform native mobile and web development team at Rantmedia, a leading UK mobile agency.  
          
          Highlights include work on a BAFTA winning cross platform game, designing a CI driven cross platform build system and shepherding the team towards a more test-driven approach to development, improving code quality and reducing reported bugs. 
          
          Successfully delivered projects for dozens of clients during my four years here. Originally recruited as a systems architect then promoted to CTO in 2016. 


